<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Table Generator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 35px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        color: white;
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      label {
        font-size: 18px;
        font-weight: 600;
      }

      input {
        padding: 14px;
        border: none;
        outline: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        font-size: 16px;
      }

      input::placeholder {
        color: #d1d5db;
      }

      button {
        padding: 14px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        color: white;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
      }

      .result-title {
        margin-top: 25px;
        text-align: center;
        color: #22c55e;
      }

      .result {
        margin-top: 15px;
        background: rgba(255, 255, 255, 0.08);
        padding: 20px;
        border-radius: 15px;
        line-height: 2;
        font-size: 18px;
        text-align: center;
      }

      @media (max-width: 600px) {
        .container {
          padding: 25px;
        }

        h1 {
          font-size: 1.6rem;
        }

        input,
        button {
          font-size: 15px;
          padding: 12px;
        }

        .result {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 Maths Table Generator</h1>

      <form
        onsubmit="
          getTable();
          return false;
        "
      >
        <label for="table">Enter Number</label>

        <input
          type="number"
          id="table"
          placeholder="Enter your number"
          required
        />

        <button type="submit">Generate Table</button>
      </form>

      <h3 id="ab" class="result-title"></h3>

      <div id="bc" class="result"></div>
    </div>

    <script>
      function getTable() {
        let table = Number(document.getElementById("table").value);

        document.getElementById("ab").innerHTML = "✅ Table Generated";

        let output = "";

        for (let i = 1; i <= 10; i++) {
          output += `${table} × ${i} = ${table * i}<br>`;
        }

        document.getElementById("bc").innerHTML = output;
      }
    </script>
  </body>
</html>

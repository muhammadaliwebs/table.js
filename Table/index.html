<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Maths Table:</h1>
    <form onsubmit="getTable();return false">
    <label for="table">Table:</label>
    <input type="number" name="table" id="table" placeholder="Enter your number" required>
    <button type="submit">Check!</button>
    </form>
    <h3 id="ab"></h3>
    <p id="bc"></p>
    <script>
        function getTable(){
            let table = Number(document.getElementById("table").value);
            alert(`Table is generating...`);
            document.getElementById("ab").innerHTML=("<h3>Table Generated:</h3>");

            for( let i = 1; i <= 10; i++){
                document.getElementById("bc").innerHTML += (`${table} x ${i} = ${table*i}<br>`);
            }
        }
    </script>
</body>
</html>
